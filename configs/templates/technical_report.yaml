style_hints:
  background: "Clean white (#FFFFFF) with subtle light gray (#F8F9FA) code block areas. Thin blue left-border accents."
  typography: "Sans-serif headings (Inter / Roboto). Monospace for code/technical terms (Fira Code style). Clear numbered sections."
