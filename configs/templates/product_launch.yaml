  colors:
    - "#1A1A2E"
    - "#FFFFFF"
    - "#6C63FF"
    - "#00D4AA"
    - "#F5F5F5"
    - "#FF6B6B"
  layout: "Hero product showcase slides. Feature highlight cards. Before/after comparison. Pricing table. Spec grid."
  visual: "Product mockup placeholders, feature icon grids, comparison tables, pricing cards, device frames, gradient accent shapes."
